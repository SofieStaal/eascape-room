<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escape Room Team Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    header { text-align: center; margin-bottom: 40px; }

    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    header p { color: #888; font-size: 1.05rem; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .card h2 { font-size: 1.3rem; margin-bottom: 20px; color: #c4b5fd; }

    label.field-label {
      display: block;
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #8b5cf6; }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .skill-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .skill-chip:hover { border-color: #444; }
    .skill-chip.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }
    .room-chip.selected { border-color: #f472b6; background: rgba(244, 114, 182, 0.1); }
    .skill-chip .icon { font-size: 1.3rem; width: 28px; text-align: center; }
    .skill-chip .label { font-size: 0.9rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: #222; color: #ccc; border: 1px solid #333; }
    .btn-secondary:hover { background: #2a2a2a; }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

    .participants-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .participant-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #111;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
    }

    .participant-row .name { font-weight: 600; font-size: 1rem; }
    .participant-row .skills-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .tag {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(139, 92, 246, 0.12);
      color: #c4b5fd;
      white-space: nowrap;
    }

    .tag.room-tag { background: rgba(244, 114, 182, 0.12); color: #f9a8d4; }

    .remove-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .remove-btn:hover { color: #f87171; background: rgba(239, 68, 68, 0.1); }

    .empty-state { text-align: center; color: #555; padding: 30px; font-size: 0.95rem; }

    .teams-grid { display: grid; gap: 20px; margin-top: 16px; }
    @media (min-width: 600px) { .teams-grid { grid-template-columns: repeat(2, 1fr); } }

    .team-card { background: #111; border-radius: 14px; border: 1px solid #2a2a2a; overflow: hidden; }
    .team-header { padding: 16px 20px; font-weight: 700; font-size: 1.1rem; border-bottom: 1px solid #2a2a2a; }
    .team-members { padding: 12px 16px; }
    .team-member { padding: 10px 4px; border-bottom: 1px solid #1a1a1a; }
    .team-member:last-child { border-bottom: none; }
    .team-member .name { font-weight: 600; margin-bottom: 4px; }
    .team-member .skills-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .team-skill-summary { padding: 12px 20px; border-top: 1px solid #1a1a1a; display: flex; gap: 6px; flex-wrap: wrap; }
    .team-skill-summary .tag { font-size: 0.7rem; opacity: 0.7; }

    .section-divider { border: none; border-top: 1px solid #222; margin: 8px 0 20px; }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(139, 92, 246, 0.15);
      color: #a78bfa;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 8px;
    }

    @media (max-width: 500px) {
      .container { padding: 20px 14px; }
      header h1 { font-size: 1.8rem; }
      .card { padding: 20px; }
      .skills-grid { grid-template-columns: 1fr; }
      .participant-row { flex-direction: column; align-items: flex-start; gap: 8px; }
    }

    /* ===== REVEAL OVERLAY ===== */
    #reveal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0a0a;
      overflow: hidden;
    }

    #reveal-overlay.active { display: flex; flex-direction: column; }

    #reveal-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .reveal-content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .reveal-title {
      font-size: 3.5rem;
      font-weight: 900;
      text-align: center;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      text-shadow: 0 0 60px rgba(139, 92, 246, 0.5);
    }

    .reveal-title.visible {
      opacity: 1;
      transform: scale(1);
    }

    .reveal-countdown {
      font-size: 8rem;
      font-weight: 900;
      opacity: 0;
      transform: scale(2);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      text-shadow: 0 0 80px rgba(139, 92, 246, 0.6);
    }

    .reveal-countdown.pop {
      opacity: 1;
      transform: scale(1);
    }

    .reveal-rooms-stage {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
    }

    .reveal-room {
      flex: 1;
      min-width: 220px;
      max-width: 300px;
      background: #111;
      border: 2px solid #222;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      opacity: 0;
      transform: translateY(40px) scale(0.9);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal-room.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .reveal-room .room-icon {
      font-size: 3rem;
      margin-bottom: 8px;
      display: block;
    }

    .reveal-room .room-name {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .reveal-room .member-slot {
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      background: #1a1a1a;
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0;
      transform: translateX(-20px);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
      white-space: nowrap;
    }

    .reveal-room .member-slot.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .reveal-room .member-slot.conflict {
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .reveal-room .member-slot .slot-roulette {
      display: inline-block;
    }

    .reveal-close {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10001;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }

    .reveal-close:hover { background: rgba(255,255,255,0.2); }

    .confetti-piece {
      position: fixed;
      z-index: 10000;
      width: 10px;
      height: 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <header>
      <h1>Escape Room Team Builder</h1>
      <p>Sign up, pick your skills, and get sorted into balanced teams</p>
    </header>

    <!-- Sign-up form -->
    <div class="card" id="signup-card">
      <h2>Sign Up</h2>
      <label class="field-label" for="name-input">Your name</label>
      <input type="text" id="name-input" placeholder="Enter your name..." autocomplete="off">

      <label class="field-label" style="margin-top:20px;">Select your skills</label>
      <div class="skills-grid" id="skills-grid"></div>

      <label class="field-label" style="margin-top:20px;">Have you done any of these rooms before?</label>
      <div class="skills-grid" id="rooms-grid"></div>
      <button class="btn btn-secondary" id="none-rooms-btn" style="margin-top:10px; padding:10px 20px; font-size:0.9rem;">None of the rooms</button>

      <div class="btn-row">
        <button class="btn btn-primary" id="add-btn" disabled>Add me</button>
      </div>
    </div>

    <!-- Participants list -->
    <div class="card" id="participants-card">
      <h2>Participants <span class="count-badge" id="count-badge">0</span></h2>
      <hr class="section-divider">
      <div id="participants-list" class="participants-list">
        <div class="empty-state">No one has signed up yet</div>
      </div>

      <label class="field-label">Which rooms are we playing today?</label>
      <div class="skills-grid" id="active-rooms-grid"></div>
      <p id="room-warning" style="color:#f87171; font-size:0.85rem; margin-top:10px; display:none;"></p>

      <div class="btn-row">
        <button class="btn btn-primary" id="generate-btn" disabled>Generate teams</button>
        <button class="btn btn-secondary" id="shuffle-btn" style="display:none;">Shuffle again</button>
        <button class="btn btn-danger" id="clear-btn" style="display:none;">Clear all</button>
      </div>
    </div>

    <!-- Teams result (static fallback) -->
    <div class="card" id="teams-card" style="display:none;">
      <h2>Your Teams</h2>
      <hr class="section-divider">
      <div class="teams-grid" id="teams-grid"></div>
      <div class="btn-row" style="margin-top:24px;">
        <button class="btn btn-secondary" id="copy-slack-btn" style="display:none;">Copy for Slack</button>
      </div>
    </div>
  </div>

  <!-- Fullscreen reveal overlay -->
  <div id="reveal-overlay">
    <canvas id="reveal-canvas"></canvas>
    <button class="reveal-close" id="reveal-close">&times;</button>
    <div class="reveal-content" id="reveal-content"></div>
  </div>

  <script>
    // --- Supabase config ---
    const SUPABASE_URL = 'https://cnngzdjezmxlurycjhco.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNubmd6ZGplem14bHVyeWNqaGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzIxNjYsImV4cCI6MjA5MDAwODE2Nn0.cZznCuhKfEXPDTlPiJRHUhlz8hWXKZrw5iCUo-II6UM';

    async function supaFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': options.prefer || '',
          ...options.headers,
        },
        method: options.method || 'GET',
        body: options.body ? JSON.stringify(options.body) : undefined,
      });
      if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    const SKILLS = [
      { id: 'puzzles',       icon: '🧩', label: 'Puzzles & Riddles' },
      { id: 'patterns',      icon: '🔍', label: 'Pattern Recognition' },
      { id: 'leader',        icon: '🎯', label: 'Leadership' },
      { id: 'communication', icon: '🗣️', label: 'Communication' },
      { id: 'search',        icon: '👀', label: 'Searching & Finding' },
      { id: 'tech',          icon: '⚙️', label: 'Tech & Gadgets' },
      { id: 'creative',      icon: '💡', label: 'Creative Thinking' },
      { id: 'calm',          icon: '🧘', label: 'Calm Under Pressure' },
      { id: 'math',          icon: '🔢', label: 'Math & Logic' },
      { id: 'teamwork',      icon: '🤝', label: 'Team Player' },
      { id: 'physical',      icon: '💪', label: 'Physical Challenges' },
      { id: 'memory',        icon: '🧠', label: 'Good Memory' },
    ];

    const ROOMS = [
      { id: 'ville_vest', icon: '🤠', label: 'Ville Vest' },
      { id: 'ondskap',    icon: '😈', label: 'Ondskap' },
      { id: 'ubaat',      icon: '🚢', label: 'Ubåt' },
      { id: 'isriket',    icon: '❄️', label: 'Isriket' },
      { id: 'gudfaren',   icon: '🎩', label: 'Gudfaren' },
    ];

    const TEAM_COLORS = ['#8b5cf6','#f472b6','#34d399','#fbbf24','#60a5fa','#fb923c','#e879f9','#2dd4bf','#f87171','#a3e635'];

    let participants = [];
    let selectedSkills = new Set();
    let selectedRooms = new Set();
    let activeRooms = new Set();

    // =====================
    // INIT
    // =====================
    async function init() {
      renderSkills();
      renderRooms();
      renderActiveRooms();
      bindEvents();
      initCanvas();
      await loadParticipants();
    }

    async function loadParticipants() {
      try {
        const data = await supaFetch('participants?select=*&order=created_at.asc');
        participants = data.map(row => ({
          id: row.id,
          name: row.name,
          skills: row.skills,
          visitedRooms: row.visited_rooms || []
        }));
      } catch (e) {
        console.error('Failed to load participants:', e);
        participants = [];
      }
      renderParticipants();
    }

    // =====================
    // RENDER GRIDS
    // =====================
    function renderSkills() {
      document.getElementById('skills-grid').innerHTML = SKILLS.map(s => `
        <div class="skill-chip" data-skill="${s.id}">
          <span class="icon">${s.icon}</span>
          <span class="label">${s.label}</span>
        </div>
      `).join('');
    }

    function renderRooms() {
      document.getElementById('rooms-grid').innerHTML = ROOMS.map(r => `
        <div class="skill-chip" data-room="${r.id}">
          <span class="icon">${r.icon}</span>
          <span class="label">${r.label}</span>
        </div>
      `).join('');
    }

    function renderActiveRooms() {
      document.getElementById('active-rooms-grid').innerHTML = ROOMS.map(r => `
        <div class="skill-chip" data-active-room="${r.id}">
          <span class="icon">${r.icon}</span>
          <span class="label">${r.label}</span>
        </div>
      `).join('');
    }

    // =====================
    // PARTICIPANTS LIST
    // =====================
    function renderParticipants() {
      const list = document.getElementById('participants-list');
      const badge = document.getElementById('count-badge');
      const clearBtn = document.getElementById('clear-btn');
      badge.textContent = participants.length;

      if (participants.length === 0) {
        list.innerHTML = '<div class="empty-state">No one has signed up yet</div>';
        clearBtn.style.display = 'none';
        updateGenerateBtn();
        return;
      }
      clearBtn.style.display = '';

      list.innerHTML = participants.map(p => `
        <div class="participant-row">
          <div>
            <div class="name">${esc(p.name)}</div>
            <div class="skills-tags">
              ${p.skills.map(sid => {
                const s = SKILLS.find(sk => sk.id === sid);
                return s ? `<span class="tag">${s.icon} ${s.label}</span>` : '';
              }).join('')}
              ${p.visitedRooms.map(rid => {
                const r = ROOMS.find(rm => rm.id === rid);
                return r ? `<span class="tag room-tag">${r.icon} ${r.label}</span>` : '';
              }).join('')}
            </div>
          </div>
          <button class="remove-btn" data-id="${p.id}" title="Remove">&times;</button>
        </div>
      `).join('');

      updateGenerateBtn();
    }

    function updateGenerateBtn() {
      document.getElementById('generate-btn').disabled = participants.length < 2 || activeRooms.size === 0;
    }

    // =====================
    // EVENTS
    // =====================
    function bindEvents() {
      document.getElementById('skills-grid').addEventListener('click', e => {
        const chip = e.target.closest('.skill-chip');
        if (!chip || chip.dataset.room) return;
        const sid = chip.dataset.skill;
        selectedSkills.has(sid) ? (selectedSkills.delete(sid), chip.classList.remove('selected')) : (selectedSkills.add(sid), chip.classList.add('selected'));
        updateAddBtn();
      });

      document.getElementById('rooms-grid').addEventListener('click', e => {
        const chip = e.target.closest('.skill-chip');
        if (!chip) return;
        const rid = chip.dataset.room;
        selectedRooms.has(rid) ? (selectedRooms.delete(rid), chip.classList.remove('selected', 'room-chip')) : (selectedRooms.add(rid), chip.classList.add('selected', 'room-chip'));
      });

      document.getElementById('none-rooms-btn').addEventListener('click', () => {
        selectedRooms.clear();
        document.querySelectorAll('#rooms-grid .skill-chip.selected').forEach(c => c.classList.remove('selected', 'room-chip'));
      });

      document.getElementById('active-rooms-grid').addEventListener('click', e => {
        const chip = e.target.closest('.skill-chip');
        if (!chip) return;
        const rid = chip.dataset.activeRoom;
        activeRooms.has(rid) ? (activeRooms.delete(rid), chip.classList.remove('selected', 'room-chip')) : (activeRooms.add(rid), chip.classList.add('selected', 'room-chip'));
        updateGenerateBtn();
        hideTeams();
      });

      document.getElementById('name-input').addEventListener('input', updateAddBtn);
      document.getElementById('name-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !document.getElementById('add-btn').disabled) addParticipant();
      });

      document.getElementById('add-btn').addEventListener('click', addParticipant);

      document.getElementById('participants-list').addEventListener('click', async e => {
        const btn = e.target.closest('.remove-btn');
        if (!btn) return;
        const id = btn.dataset.id;
        try {
          await supaFetch(`participants?id=eq.${id}`, { method: 'DELETE' });
          participants = participants.filter(p => p.id !== id);
          renderParticipants();
          hideTeams();
        } catch (e) { console.error('Failed to remove:', e); }
      });

      document.getElementById('generate-btn').addEventListener('click', () => launchReveal());
      document.getElementById('shuffle-btn').addEventListener('click', () => launchReveal());
      document.getElementById('clear-btn').addEventListener('click', async () => {
        if (confirm('Remove all participants?')) {
          try {
            await supaFetch('participants?id=not.is.null', { method: 'DELETE' });
            participants = [];
            renderParticipants();
            hideTeams();
          } catch (e) { console.error('Failed to clear:', e); }
        }
      });

      document.getElementById('reveal-close').addEventListener('click', closeReveal);
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeReveal();
      });

      document.getElementById('copy-slack-btn').addEventListener('click', copyForSlack);
    }

    function updateAddBtn() {
      const name = document.getElementById('name-input').value.trim();
      document.getElementById('add-btn').disabled = !name || selectedSkills.size === 0;
    }

    async function addParticipant() {
      const nameInput = document.getElementById('name-input');
      const addBtn = document.getElementById('add-btn');
      const name = nameInput.value.trim();
      if (!name || selectedSkills.size === 0) return;

      addBtn.disabled = true;
      addBtn.textContent = 'Adding...';

      try {
        const skills = [...selectedSkills];
        const visited_rooms = [...selectedRooms];
        const rows = await supaFetch('participants', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name, skills, visited_rooms },
        });
        participants.push({ id: rows[0].id, name, skills, visitedRooms: visited_rooms });
      } catch (e) {
        console.error('Failed to add:', e);
        alert('Failed to sign up. Please try again.');
      }

      nameInput.value = '';
      selectedSkills.clear();
      selectedRooms.clear();
      document.querySelectorAll('#skills-grid .skill-chip.selected, #rooms-grid .skill-chip.selected').forEach(c => c.classList.remove('selected', 'room-chip'));
      addBtn.textContent = 'Add me';
      updateAddBtn();
      nameInput.focus();
      renderParticipants();
      updateGenerateBtn();
      hideTeams();
    }

    // =====================
    // IMPROVED ALGORITHM
    // =====================
    function computeTeams(roomList) {
      const numTeams = roomList.length;
      const allSkillIds = [...new Set(participants.flatMap(p => p.skills))];

      function runOnce() {
        const teams = Array.from({ length: numTeams }, () => []);
        const teamSkills = Array.from({ length: numTeams }, () => ({}));
        const conflicts = [];

        // Shuffle
        const shuffled = [...participants].sort(() => Math.random() - 0.5);

        // Sort by ELIGIBLE rooms count (ascending = most constrained first)
        shuffled.sort((a, b) => {
          const aEligible = roomList.filter(r => !(a.visitedRooms || []).includes(r)).length;
          const bEligible = roomList.filter(r => !(b.visitedRooms || []).includes(r)).length;
          return aEligible - bEligible;
        });

        for (const person of shuffled) {
          const visited = new Set(person.visitedRooms || []);
          const eligible = [];
          for (let t = 0; t < numTeams; t++) {
            if (!visited.has(roomList[t])) eligible.push(t);
          }

          if (eligible.length === 0) {
            conflicts.push(person.name);
            let smallest = 0;
            for (let t = 1; t < numTeams; t++) {
              if (teams[t].length < teams[smallest].length) smallest = t;
            }
            teams[smallest].push(person);
            for (const s of person.skills) {
              teamSkills[smallest][s] = (teamSkills[smallest][s] || 0) + 1;
            }
            continue;
          }

          let bestTeam = eligible[0];
          let bestScore = -Infinity;

          for (const t of eligible) {
            const sizePenalty = teams[t].length * 4;
            let skillBonus = 0;
            for (const s of person.skills) {
              if (!teamSkills[t][s]) skillBonus += 2.5;
              else skillBonus -= 0.5;
            }
            const score = skillBonus - sizePenalty;
            if (score > bestScore) {
              bestScore = score;
              bestTeam = t;
            }
          }

          teams[bestTeam].push(person);
          for (const s of person.skills) {
            teamSkills[bestTeam][s] = (teamSkills[bestTeam][s] || 0) + 1;
          }
        }

        return { teams, teamSkills, conflicts };
      }

      function scoreResult({ teams, teamSkills, conflicts }) {
        let score = 0;
        // Penalize conflicts heavily
        score -= conflicts.length * 100;

        // Reward even team sizes
        const sizes = teams.map(t => t.length);
        const avgSize = sizes.reduce((a, b) => a + b, 0) / sizes.length;
        for (const s of sizes) score -= Math.abs(s - avgSize) * 10;

        // Reward skill diversity per team
        for (let t = 0; t < teams.length; t++) {
          const covered = Object.keys(teamSkills[t]).length;
          score += covered * 3;
        }

        // Penalize skill variance between teams
        const coverages = teams.map((_, t) => Object.keys(teamSkills[t]).length);
        const avgCov = coverages.reduce((a, b) => a + b, 0) / coverages.length;
        for (const c of coverages) score -= Math.abs(c - avgCov) * 2;

        return score;
      }

      // Run 50 attempts and keep the best
      let best = null;
      let bestScore = -Infinity;
      for (let i = 0; i < 50; i++) {
        const result = runOnce();
        const s = scoreResult(result);
        if (s > bestScore) {
          bestScore = s;
          best = result;
        }
      }

      return best;
    }

    // =====================
    // STATIC TEAMS RENDER
    // =====================
    let lastResult = null;

    function renderTeamsStatic(teams, teamSkills, roomList, conflicts) {
      lastResult = { teams, roomList, conflicts };
      const card = document.getElementById('teams-card');
      const grid = document.getElementById('teams-grid');
      const warning = document.getElementById('room-warning');

      card.style.display = '';
      document.getElementById('shuffle-btn').style.display = '';
      document.getElementById('copy-slack-btn').style.display = '';

      if (conflicts.length > 0) {
        warning.textContent = `${conflicts.join(', ')} har gjort alle valgte rom — plassert i minste lag.`;
        warning.style.display = '';
      } else {
        warning.style.display = 'none';
      }

      grid.innerHTML = teams.map((team, i) => {
        const color = TEAM_COLORS[i % TEAM_COLORS.length];
        const room = ROOMS.find(r => r.id === roomList[i]);
        const allSkills = new Set();
        team.forEach(p => p.skills.forEach(s => allSkills.add(s)));

        return `
          <div class="team-card" style="border-color: ${color}33;">
            <div class="team-header" style="background: ${color}15; color: ${color};">
              ${room.icon} ${room.label} <span style="font-weight:400; font-size:0.85rem; opacity:0.7;">(${team.length} players)</span>
            </div>
            <div class="team-members">
              ${team.map(p => {
                const hasConflict = (p.visitedRooms || []).includes(roomList[i]);
                return `
                <div class="team-member">
                  <div class="name">${esc(p.name)}${hasConflict ? ' <span style="color:#f87171; font-size:0.8rem;">has done this room</span>' : ''}</div>
                  <div class="skills-tags">
                    ${p.skills.map(sid => {
                      const s = SKILLS.find(sk => sk.id === sid);
                      return s ? `<span class="tag">${s.icon} ${s.label}</span>` : '';
                    }).join('')}
                  </div>
                </div>`;
              }).join('')}
              ${team.length === 0 ? '<div class="empty-state" style="padding:16px 0;">Empty</div>' : ''}
            </div>
            <div class="team-skill-summary">
              ${[...allSkills].map(sid => {
                const s = SKILLS.find(sk => sk.id === sid);
                return s ? `<span class="tag">${s.icon} ${s.label} &times;${teamSkills[i][sid]}</span>` : '';
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function hideTeams() {
      document.getElementById('teams-card').style.display = 'none';
      document.getElementById('shuffle-btn').style.display = 'none';
      document.getElementById('copy-slack-btn').style.display = 'none';
    }

    function copyForSlack() {
      if (!lastResult) return;
      const { teams, roomList, conflicts } = lastResult;

      let text = '🔐 *Escape Room Teams*\n\n';

      teams.forEach((team, i) => {
        const room = ROOMS.find(r => r.id === roomList[i]);
        text += `${room.icon} *${room.label}*\n`;
        team.forEach(p => {
          const hasConflict = (p.visitedRooms || []).includes(roomList[i]);
          text += `    •  ${p.name}`;
          if (hasConflict) text += '  ⚠️ has done this room';
          text += '\n';
        });
        text += '\n';
      });

      if (conflicts.length > 0) {
        text += `⚠️ _${conflicts.join(', ')} har gjort alle valgte rom — plassert i minste lag._\n`;
      }

      text += '🎯 Good luck and have fun!';

      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-slack-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy for Slack'; }, 2000);
      });
    }

    // =====================
    // PARTICLE CANVAS
    // =====================
    let canvasCtx, particles = [], animFrame;

    function initCanvas() {
      const canvas = document.getElementById('reveal-canvas');
      canvasCtx = canvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      const canvas = document.getElementById('reveal-canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function spawnParticles(count, color, x, y) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
          x: x ?? Math.random() * window.innerWidth,
          y: y ?? Math.random() * window.innerHeight,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 2 + Math.random() * 3,
          color: color || `hsla(${260 + Math.random() * 60}, 80%, 70%, ${0.3 + Math.random() * 0.5})`,
          life: 1,
          decay: 0.003 + Math.random() * 0.008,
        });
      }
    }

    function animateParticles() {
      const canvas = document.getElementById('reveal-canvas');
      const ctx = canvasCtx;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.02; // gravity
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }

        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      animFrame = requestAnimationFrame(animateParticles);
    }

    // =====================
    // SOUND FX (Web Audio)
    // =====================
    let audioCtx;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTick() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 800 + Math.random() * 400;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    }

    function playRevealSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    }

    function playCountdownBeep(pitch) {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = pitch;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    }

    function playFanfare() {
      const ctx = getAudioCtx();
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'triangle';
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.12 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.4);
        osc.start(ctx.currentTime + i * 0.12);
        osc.stop(ctx.currentTime + i * 0.12 + 0.4);
      });
    }

    // =====================
    // CONFETTI
    // =====================
    function launchConfetti() {
      const colors = ['#8b5cf6','#f472b6','#34d399','#fbbf24','#60a5fa','#fb923c','#e879f9'];
      for (let i = 0; i < 150; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-10px';
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(el);

        const duration = 1500 + Math.random() * 2000;
        const endY = window.innerHeight + 50;
        const drift = (Math.random() - 0.5) * 200;

        el.animate([
          { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
          { transform: `translate(${drift}px, ${endY}px) rotate(${360 + Math.random() * 720}deg)`, opacity: 0 }
        ], { duration, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)', fill: 'forwards' });

        setTimeout(() => el.remove(), duration);
      }
    }

    // =====================
    // NAME ROULETTE
    // =====================
    function rouletteEffect(el, finalName, allNames, duration) {
      return new Promise(resolve => {
        const interval = 60;
        let elapsed = 0;
        const timer = setInterval(() => {
          elapsed += interval;
          if (elapsed >= duration) {
            clearInterval(timer);
            el.textContent = finalName;
            resolve();
            return;
          }
          el.textContent = allNames[Math.floor(Math.random() * allNames.length)];
          playTick();
        }, interval);
      });
    }

    // =====================
    // REVEAL SEQUENCE
    // =====================
    let revealAborted = false;

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function launchReveal() {
      revealAborted = false;
      const roomList = [...activeRooms];
      const result = computeTeams(roomList);
      const { teams, teamSkills, conflicts } = result;

      // Also render static version behind overlay
      renderTeamsStatic(teams, teamSkills, roomList, conflicts);

      const overlay = document.getElementById('reveal-overlay');
      const content = document.getElementById('reveal-content');
      overlay.classList.add('active');
      particles = [];
      animateParticles();
      spawnParticles(40);

      const allNames = participants.map(p => p.name);

      // Phase 1: Title
      content.innerHTML = `<div class="reveal-title" id="rtitle" style="background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Escape Room<br>Team Reveal</div>`;
      await sleep(200);
      if (revealAborted) return;
      document.getElementById('rtitle').classList.add('visible');
      await sleep(2000);
      if (revealAborted) return;

      // Phase 2: Countdown
      content.innerHTML = `<div class="reveal-countdown" id="rcount"></div>`;
      for (let n = 3; n >= 1; n--) {
        if (revealAborted) return;
        const el = document.getElementById('rcount');
        el.textContent = n;
        el.style.background = `linear-gradient(135deg, ${TEAM_COLORS[n]}, ${TEAM_COLORS[n + 1]})`;
        el.style.webkitBackgroundClip = 'text';
        el.style.webkitTextFillColor = 'transparent';
        el.classList.remove('pop');
        void el.offsetWidth; // force reflow
        el.classList.add('pop');
        playCountdownBeep(300 + n * 100);
        spawnParticles(20, null, window.innerWidth / 2, window.innerHeight / 2);
        await sleep(900);
      }
      if (revealAborted) return;

      // Phase 3: Room cards
      let roomsHTML = '<div class="reveal-rooms-stage" id="rstage">';
      teams.forEach((team, i) => {
        const room = ROOMS.find(r => r.id === roomList[i]);
        const color = TEAM_COLORS[i % TEAM_COLORS.length];
        roomsHTML += `
          <div class="reveal-room" id="rroom-${i}" style="border-color: ${color}44;">
            <span class="room-icon">${room.icon}</span>
            <div class="room-name" style="color: ${color};">${room.label}</div>
            ${team.map((_, mi) => `<div class="member-slot" id="rslot-${i}-${mi}"><span class="slot-roulette">???</span></div>`).join('')}
          </div>
        `;
      });
      roomsHTML += '</div>';
      content.innerHTML = roomsHTML;

      // Reveal rooms one by one
      for (let i = 0; i < teams.length; i++) {
        if (revealAborted) return;
        await sleep(300);
        const roomEl = document.getElementById(`rroom-${i}`);
        roomEl.classList.add('visible');
        const color = TEAM_COLORS[i % TEAM_COLORS.length];
        const rect = roomEl.getBoundingClientRect();
        spawnParticles(15, color, rect.left + rect.width / 2, rect.top + rect.height / 2);
        playRevealSound();
      }

      await sleep(600);
      if (revealAborted) return;

      // Phase 4: Reveal names with roulette
      const maxMembers = Math.max(...teams.map(t => t.length));
      for (let mi = 0; mi < maxMembers; mi++) {
        // Reveal this slot index across all teams in parallel
        const reveals = [];
        for (let ti = 0; ti < teams.length; ti++) {
          if (mi >= teams[ti].length) continue;
          const slotEl = document.getElementById(`rslot-${ti}-${mi}`);
          const rouletteEl = slotEl.querySelector('.slot-roulette');
          slotEl.classList.add('visible');

          const person = teams[ti][mi];
          const hasConflict = (person.visitedRooms || []).includes(roomList[ti]);
          if (hasConflict) slotEl.classList.add('conflict');

          reveals.push(
            rouletteEffect(rouletteEl, person.name, allNames, 800 + Math.random() * 400)
              .then(() => {
                playRevealSound();
                const color = TEAM_COLORS[ti % TEAM_COLORS.length];
                const rect = slotEl.getBoundingClientRect();
                spawnParticles(8, color, rect.left + rect.width / 2, rect.top + rect.height / 2);
              })
          );
        }
        await Promise.all(reveals);
        if (revealAborted) return;
        await sleep(400);
      }

      // Phase 5: Fanfare!
      await sleep(300);
      playFanfare();
      launchConfetti();
      spawnParticles(80, null, window.innerWidth / 2, 100);
    }

    function closeReveal() {
      revealAborted = true;
      const overlay = document.getElementById('reveal-overlay');
      overlay.classList.remove('active');
      cancelAnimationFrame(animFrame);
      particles = [];
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    init();
  </script>
